<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ESP Peer Handshake Test</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      color-scheme: dark;
    }

    body {
      background: #0a0a0a;
      color: #eee;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100dvh;
      padding: 1rem;
      gap: 1rem;
    }

    h1 {
      font-size: 1.2rem;
      letter-spacing: 0.05em;
      opacity: 0.7;
    }

    #status {
      font-size: 0.85rem;
      padding: 0.4rem 0.8rem;
      border-radius: 999px;
      background: #222;
    }

    #status.ok {
      background: #14532d;
      color: #4ade80;
    }

    #status.err {
      background: #450a0a;
      color: #f87171;
    }

    #preview {
      width: 100%;
      max-width: 640px;
      height: auto;
      aspect-ratio: 4 / 3;
      background: #111;
      border-radius: 0.75rem;
      object-fit: contain;
      transform: scaleY(-1);
      display: none;
    }

    .video-panel {
      width: 100%;
      max-width: 640px;
      display: flex;
      justify-content: center;
    }

    .video-panel[hidden] {
      display: none;
    }

    .toolbar {
      width: 100%;
      max-width: 640px;
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
    }

    .btn-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      padding: 0.75rem 2rem;
      border: none;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      color: white;
      transition: background 0.2s;
    }

    button:disabled {
      background: #333;
      color: #666;
      cursor: default;
    }

    #startBtn {
      background: #2563eb;
    }

    #stopBtn {
      background: #dc2626;
    }

    #settingsBtn,
    #saveSettingsBtn {
      background: #374151;
    }

    .toggle-row {
      width: 100%;
      max-width: 640px;
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      font-size: 0.9rem;
      opacity: 0.9;
    }

    .toggle input {
      width: 1rem;
      height: 1rem;
      accent-color: #2563eb;
    }

    #settings-panel,
    #log {
      width: 100%;
      max-width: 640px;
    }

    #settings-panel {
      display: none;
      flex-direction: column;
      gap: 0.85rem;
      background: #151515;
      border-radius: 0.75rem;
      padding: 0.9rem;
    }

    #settings-panel h2 {
      font-size: 0.9rem;
      opacity: 0.6;
      letter-spacing: 0.05em;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .field label {
      font-size: 0.82rem;
      opacity: 0.75;
    }

    .field input {
      width: 100%;
      border: 1px solid #2d2d2d;
      border-radius: 0.5rem;
      background: #111;
      color: #eee;
      padding: 0.75rem 0.85rem;
      font-size: 0.95rem;
    }

    #settings-note {
      font-size: 0.75rem;
      opacity: 0.55;
      line-height: 1.5;
    }

    #log {
      font-size: 0.75rem;
      opacity: 0.55;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 420px;
      overflow: auto;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.75;
      color: inherit;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .brand:hover {
      opacity: 1;
    }

    .brand svg {
      height: 1.4rem;
      width: auto;
    }

    .brand span {
      opacity: 0.6;
    }
  </style>
</head>

  <h1>ESP WEBRTC HANDSHAKE TEST</h1>
  <div id="status">Idle</div>

  <div class="video-panel" id="videoPanel" hidden>
    <img id="preview" alt="ESP camera frame">
  </div>

  <div class="toolbar">
    <button id="settingsBtn" type="button">Settings</button>
  </div>

  <div class="btn-row">
    <button id="startBtn" type="button">Start Handshake</button>
    <button id="stopBtn" type="button" disabled>Stop</button>
  </div>

  <div class="toggle-row">
    <label class="toggle">
      <input id="forceRelay" type="checkbox">
      <span>Force TURN relay (test relay path)</span>
    </label>
  </div>

  <div id="settings-panel">
    <h2>SETTINGS</h2>
    <div class="field">
      <label for="namespaceId">Anedya Node ID</label>
      <input id="namespaceId" type="text" placeholder="Node UUID" autocomplete="off">
    </div>
    <div class="field">
      <label for="apiKey">Platform API Key</label>
      <input id="apiKey" type="password" placeholder="Bearer token or raw token" autocomplete="off">
    </div>
    <button id="saveBtn" type="button">Save Settings</button>
    <div id="settings-note">Node ID and API key are stored in this browser via localStorage. Prefix key with <code>Bearer</code> if your token needs it.</div>
  </div>

  <pre id="log"></pre>

  <script>
    const API_BASE = "https://api.ap-in-1.anedya.io/v1";
    const STORAGE = {
      namespaceId: "esp-peer-test.namespaceId",
      apiKey: "esp-peer-test.apiKey",
      forceRelay: "esp-peer-test.forceRelay",
    };

    const statusEl = document.getElementById("status");
    const logEl = document.getElementById("log");
    const videoPanelEl = document.getElementById("videoPanel");
    const previewEl = document.getElementById("preview");
    const settingsPanelEl = document.getElementById("settings-panel");
    const settingsBtn = document.getElementById("settingsBtn");
    const namespaceIdEl = document.getElementById("namespaceId");
    const apiKeyEl = document.getElementById("apiKey");
    const forceRelayEl = document.getElementById("forceRelay");
    const saveBtn = document.getElementById("saveBtn");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");

    let pc = null;
    let dc = null;
    let pollTimer = null;
    let connectTimer = null;
    let lastFrameUrl = null;
    let frameCount = 0;
    let statsStartMs = 0;
    let statsLastReportMs = 0;
    let statsWindowFrames = 0;
    let statsWindowBytes = 0;
    let statsTotalBytes = 0;
    const VERBOSE_FRAME_LOG = false;

    namespaceIdEl.value = localStorage.getItem(STORAGE.namespaceId) || "";
    apiKeyEl.value = localStorage.getItem(STORAGE.apiKey) || "";
    forceRelayEl.checked = localStorage.getItem(STORAGE.forceRelay) === "true";
    settingsPanelEl.style.display = (!namespaceIdEl.value || !apiKeyEl.value) ? "flex" : "none";

    settingsBtn.addEventListener("click", () => {
      settingsPanelEl.style.display = settingsPanelEl.style.display === "flex" ? "none" : "flex";
    });

    function log(message) {
      const stamp = new Date().toLocaleTimeString();
      logEl.textContent += `[${stamp}] ${message}\n`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    function setStatus(text, kind = "") {
      statusEl.textContent = text;
      statusEl.className = kind;
    }

    function apiKey() {
      const value = apiKeyEl.value.trim();
      if (!value) throw new Error("Missing Platform API key");
      return value.startsWith("Bearer ") ? value : `Bearer ${value}`;
    }

    function namespaceId() {
      const value = namespaceIdEl.value.trim();
      if (!value) throw new Error("Missing Anedya Node ID");
      return value;
    }

    function headers() {
      return {
        "Accept": "application/json",
        "Content-Type": "application/json",
        "Authorization": apiKey(),
      };
    }


    // Ask Anedya whether the node has heartbeated recently. Throws if the device
    // is offline (or the status can't be determined), so the caller can abort
    // before spending time on the WebRTC handshake against a dead device.
    // Device heartbeats every 30 s (see anedya_signaling.c). 90 s tolerates one
    // or two missed beats before we call it offline.
    async function checkNodeOnline(thresholdSeconds = 90) {
      const node = namespaceId();
      const resp = await fetch(`${API_BASE}/health/status`, {
        method: "POST",
        headers: headers(),
        body: JSON.stringify({ nodes: [node], lastContactThreshold: thresholdSeconds }),
      });
      if (!resp.ok) {
        throw new Error(`Health check failed: ${resp.status} ${await resp.text()}`);
      }
      const json = await resp.json();
      if (json.success === false) {
        throw new Error(`Health check error: ${json.error || json.reasonCode || "unknown"}`);
      }
      const info = json.data?.[node];
      if (!info) {
        throw new Error("Health check returned no data for this node");
      }
      if (!info.online) {
        const last = info.lastHeartbeat
          ? new Date(info.lastHeartbeat * 1000).toLocaleString()
          : "never";
        throw new Error(`Device is OFFLINE (last heartbeat: ${last})`);
      }
      log(`Device is online (last heartbeat: ${new Date(info.lastHeartbeat * 1000).toLocaleTimeString()})`);
    }

    async function fetchTurnCredentials() {
      const resp = await fetch(`${API_BASE}/relay/create`, {
        method: 'POST',
        headers: headers(),
        body: JSON.stringify({ relayType: 'turn' }),
      });
      if (!resp.ok) throw new Error(`TURN fetch failed: ${resp.status}`);
      const json = await resp.json();
      if (!json.relayData) throw new Error(json.error || 'no relayData');
      return {
        ...json.relayData,
        password: json.relayData.credential,
        relayExpiry: json.relayExpiry,
      };
    }

    async function deflateRaw(str) {
      const encoded = new TextEncoder().encode(str);
      const cs = new CompressionStream("deflate-raw");
      const writer = cs.writable.getWriter();
      writer.write(encoded);
      writer.close();
      const chunks = [];
      const reader = cs.readable.getReader();
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        chunks.push(value);
      }
      const total = chunks.reduce((n, c) => n + c.length, 0);
      const buf = new Uint8Array(total);
      let offset = 0;
      for (const c of chunks) { buf.set(c, offset); offset += c.length; }
      return buf;
    }

    function uint8ToBase64(buf) {
      let binary = "";
      for (let i = 0; i < buf.length; i++) binary += String.fromCharCode(buf[i]);
      return btoa(binary);
    }

    function base64ToUint8(b64) {
      const binary = atob(b64);
      const buf = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) buf[i] = binary.charCodeAt(i);
      return buf;
    }

    async function inflateRaw(buf) {
      const ds = new DecompressionStream("deflate-raw");
      const writer = ds.writable.getWriter();
      writer.write(buf);
      writer.close();
      const chunks = [];
      const reader = ds.readable.getReader();
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        chunks.push(value);
      }
      const total = chunks.reduce((n, c) => n + c.length, 0);
      const out = new Uint8Array(total);
      let offset = 0;
      for (const c of chunks) { out.set(c, offset); offset += c.length; }
      return new TextDecoder().decode(out);
    }

    // Send the WebRTC offer as the "webrtc_offer" command. The returned
    // commandId is the correlation key: the ESP answers by attaching the SDP
    // answer as this command's ackdata. Returns the commandId.
    async function sendOfferViaCommand(offerPayload) {
      const compressed = await deflateRaw(offerPayload);
      const b64 = uint8ToBase64(compressed);
      log(`Offer: raw=${offerPayload.length}B → deflate=${compressed.length}B → base64=${b64.length}B`);
      if (b64.length > 950) {
        throw new Error(`Compressed offer too large for command payload: ${b64.length} bytes (limit ~1000)`);
      }
      const response = await fetch(`${API_BASE}/commands/send`, {
        method: "POST",
        headers: headers(),
        body: JSON.stringify({
          nodeId: namespaceId(),
          command: "webrtc_offer",
          data: b64,
          type: "string",
          expiry: Date.now() + 300_000,
        }),
      });
      if (!response.ok) {
        throw new Error(`Command send failed: ${response.status} ${await response.text()}`);
      }
      const json = await response.json();
      // The send response carries the command id; field name has varied
      // (commandId / id / commandID), so accept whichever is present.
      const commandId = json.commandId || json.id || json.commandID;
      if (!commandId) {
        throw new Error(`Command send returned no id: ${JSON.stringify(json)}`);
      }
      log(`Command sent: commandId=${commandId}`);
      return commandId;
    }

    // Poll a command's full details. Returns the command object including
    // status, ackdata (base64 of deflate-raw answer SDP) and ackdatatype.
    async function getCommandStatus(commandId) {
      const response = await fetch(`${API_BASE}/commands/getDetails`, {
        method: "POST",
        headers: headers(),
        body: JSON.stringify({ commandId }),
      });
      if (!response.ok) return null;
      return await response.json();
    }

    function waitForIceGatheringComplete(peerConnection, timeoutMs = 15000) {
      if (peerConnection.iceGatheringState === "complete") return Promise.resolve();
      return new Promise((resolve) => {
        const timeout = setTimeout(resolve, timeoutMs);
        peerConnection.addEventListener("icegatheringstatechange", () => {
          if (peerConnection.iceGatheringState === "complete") {
            clearTimeout(timeout);
            resolve();
          }
        });
      });
    }

    // keepStatus: when true, don't overwrite the status badge (the caller has
    // already set an error/failure message that should stay visible).
    function stop(keepStatus = false) {
      if (pollTimer) {
        clearInterval(pollTimer);
        pollTimer = null;
      }
      if (connectTimer) {
        clearTimeout(connectTimer);
        connectTimer = null;
      }
      if (dc) {
        dc.close();
        dc = null;
      }
      if (pc) {
        pc.close();
        pc = null;
      }
      if (lastFrameUrl) {
        URL.revokeObjectURL(lastFrameUrl);
        lastFrameUrl = null;
      }
      previewEl.removeAttribute("src");
      previewEl.style.display = "none";
      videoPanelEl.hidden = true;
      frameCount = 0;
      statsStartMs = 0;
      statsLastReportMs = 0;
      statsWindowFrames = 0;
      statsWindowBytes = 0;
      statsTotalBytes = 0;
      startBtn.disabled = false;
      stopBtn.disabled = true;
      if (!keepStatus) setStatus("Stopped");
      log("Stopped");
    }

    saveBtn.addEventListener("click", () => {
      localStorage.setItem(STORAGE.namespaceId, namespaceIdEl.value.trim());
      localStorage.setItem(STORAGE.apiKey, apiKeyEl.value.trim());
      localStorage.setItem(STORAGE.forceRelay, forceRelayEl.checked ? "true" : "false");
      settingsPanelEl.style.display = "none";
      log("Settings saved");
    });

    stopBtn.addEventListener("click", () => stop());

    startBtn.addEventListener("click", async () => {
      try {
        logEl.textContent = "";
        startBtn.disabled = true;
        stopBtn.disabled = false;

        // Bail out early if the ESP isn't online — no point handshaking a device
        // that hasn't heartbeated. checkNodeOnline throws when offline.
        setStatus("Checking device status...");
        await checkNodeOnline();

        setStatus("Creating offer...");

        const iceServers = [{ urls: "stun:turn1.ap-in-1.anedya.io:3478" }];
        let turnCreds = null;
        try {
          turnCreds = await fetchTurnCredentials();
          iceServers.push({
            urls: "turn:turn1.ap-in-1.anedya.io:3478",
            username: turnCreds.username,
            credential: turnCreds.password,
          });
          log("Fetched Anedya TURN credentials");
        } catch (error) {
          log(`TURN fetch failed, continuing with STUN only: ${error.message}`);
        }

        // "all" lets ICE pick the best path (direct srflx if possible, relay if
        // not). "relay" forces the browser to send only relay candidates, so the
        // only viable pair is browser-relay <-> esp-relay — use it to verify the
        // TURN path end-to-end. The ESP stays on POLICY_ALL either way (its
        // relay-only mode has no fallback and is fragile), but it still gathers a
        // relay candidate, so relay pairing works.
        const ICE_TRANSPORT_POLICY = forceRelayEl.checked ? "relay" : "all";
        if (ICE_TRANSPORT_POLICY === "relay" && !turnCreds) {
          throw new Error("Force-relay is on but TURN credentials could not be fetched");
        }
        pc = new RTCPeerConnection({
          iceServers,
          iceTransportPolicy: ICE_TRANSPORT_POLICY,
        });
        log(`Using ${iceServers.length} ICE server(s) for WebRTC (policy=${ICE_TRANSPORT_POLICY})`);

        dc = pc.createDataChannel("jpeg-test", {
          ordered: false,
          maxRetransmits: 0,
        });
        dc.binaryType = "arraybuffer";
        log("Created unordered/unreliable data channel for live JPEG");

        dc.onopen = () => {
          setStatus("Data channel open", "ok");
          log("SUCCESS: data channel opened. WebRTC handshake works.");
          dc.send("browser handshake test ping");
        };

        dc.onclose = () => log("Data channel closed");
        dc.onerror = (event) => log(`Data channel error: ${event.error || "unknown"}`);
        function recordJpegStats(byteLength) {
          const now = performance.now();
          if (!statsStartMs) {
            statsStartMs = now;
            statsLastReportMs = now;
          }

          statsWindowFrames += 1;
          statsWindowBytes += byteLength;
          statsTotalBytes += byteLength;

          const windowSeconds = (now - statsLastReportMs) / 1000;
          if (windowSeconds < 5 && statsWindowFrames < 25) return;

          const fps = statsWindowFrames / Math.max(windowSeconds, 0.001);

          log(`FPS: ${fps.toFixed(1)}`);

          statsLastReportMs = now;
          statsWindowFrames = 0;
          statsWindowBytes = 0;
        }

        dc.onmessage = (event) => {
          const data = event.data;
          if (data instanceof ArrayBuffer) {
            frameCount += 1;
            recordJpegStats(data.byteLength);
            const blob = new Blob([data], { type: "image/jpeg" });
            const nextUrl = URL.createObjectURL(blob);
            previewEl.src = nextUrl;
            videoPanelEl.hidden = false;
            previewEl.style.display = "block";
            if (lastFrameUrl) URL.revokeObjectURL(lastFrameUrl);
            lastFrameUrl = nextUrl;
            if (VERBOSE_FRAME_LOG || frameCount <= 5 || frameCount % 30 === 0) {
              log(`Received JPEG frame #${frameCount}: ${data.byteLength} bytes`);
            }
          } else if (data instanceof Blob) {
            frameCount += 1;
            recordJpegStats(data.size);
            const nextUrl = URL.createObjectURL(data);
            previewEl.src = nextUrl;
            videoPanelEl.hidden = false;
            previewEl.style.display = "block";
            if (lastFrameUrl) URL.revokeObjectURL(lastFrameUrl);
            lastFrameUrl = nextUrl;
            if (VERBOSE_FRAME_LOG || frameCount <= 5 || frameCount % 30 === 0) {
              log(`Received JPEG frame #${frameCount}: ${data.size} bytes`);
            }
          } else {
            log(`Received text message: ${data}`);
          }
        };

        async function logSelectedCandidatePair() {
          const stats = await pc.getStats();
          for (const report of stats.values()) {
            if (report.type === "transport" && report.selectedCandidatePairId) {
              const pair = stats.get(report.selectedCandidatePairId);
              if (!pair) continue;
              const local = stats.get(pair.localCandidateId);
              const remote = stats.get(pair.remoteCandidateId);
              log(`Selected pair: local=${local?.candidateType} remote=${remote?.candidateType} ` +
                  `(${local?.address}:${local?.port} -> ${remote?.address}:${remote?.port})`);
              if (local?.candidateType === "relay" || remote?.candidateType === "relay") {
                log("CONFIRMED: traffic is flowing through TURN relay");
              } else {
                log("Traffic is NOT using relay (host/srflx direct path)");
              }
            }
          }
        }

        pc.onconnectionstatechange = () => {
          log(`PC connectionState: ${pc.connectionState}`);
          if (pc.connectionState === "connected") {
            if (connectTimer) { clearTimeout(connectTimer); connectTimer = null; }
            setStatus("Peer connected", "ok");
            logSelectedCandidatePair();
          } else if (pc.connectionState === "failed") {
            setStatus("Connection failed", "err");
            log("Connection failed (ICE/DTLS could not be established)");
            stop(true);
          } else if (pc.connectionState === "disconnected") {
            setStatus("Connection lost", "err");
            log("Connection lost");
            stop(true);
          }
        };

        pc.oniceconnectionstatechange = () => log(`ICE connectionState: ${pc.iceConnectionState}`);
        pc.onicegatheringstatechange = () => log(`ICE gatheringState: ${pc.iceGatheringState}`);
        pc.onsignalingstatechange = () => log(`Signaling state: ${pc.signalingState}`);

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        log("Waiting for browser ICE gathering...");
        await waitForIceGatheringComplete(pc);

        const rawOfferSdp = pc.localDescription.sdp;
        const offerSdp = rawOfferSdp.replaceAll("a=setup:actpass", "a=setup:passive");
        log(`Local offer SDP length: ${offerSdp.length} chars`);
        if (offerSdp !== rawOfferSdp) {
          log("Forced offer DTLS setup:passive so ESP initiates DTLS");
        }
        const offerPayload = JSON.stringify({
          type: "offer",
          sdp: offerSdp,
          turn: turnCreds ? { username: turnCreds.username, credential: turnCreds.password } : null,
        });
        const commandId = await sendOfferViaCommand(offerPayload);
        log(`Sent compressed offer via Anedya command (id=${commandId})`);
        log(`Polling command status every 2 seconds...`);
        setStatus("Waiting for ESP answer...");

        let attempts = 0;
        let answerApplied = false;
        pollTimer = setInterval(async () => {
          attempts += 1;
          if (!pc || pc.signalingState === "closed") return;
          // Once the answer is applied, the browser's own pc.connectionState is
          // the source of truth; keep polling only to surface the ESP's final
          // success/failure, but stop nagging the user about a missing answer.
          if (attempts > 45) {
            clearInterval(pollTimer);
            pollTimer = null;
            if (!answerApplied) {
              setStatus("Timed out waiting for answer", "err");
              log("Timed out after 90 seconds");
              stop(true);
            } else {
              log("Stopped polling command status (answer already applied)");
            }
            return;
          }

          try {
            const cmd = await getCommandStatus(commandId);
            if (!cmd) {
              log(`Status fetch failed (${attempts})`);
              return;
            }

            // The ESP concludes the command "failure" if anything fails
            // (bad offer, deflate error, or the WebRTC connection failing).
            if (cmd.status === "failure") {
              clearInterval(pollTimer);
              pollTimer = null;
              const reason = cmd.ackdata || cmd.error || "";
              setStatus("ESP reported failure", "err");
              log(`Command status=failure: ${reason}`);
              stop(true);
              return;
            }

            // The ESP concludes "success" once its data channel is connected.
            if (cmd.status === "success") {
              clearInterval(pollTimer);
              pollTimer = null;
              log("Command status=success (ESP confirmed data channel)");
              return;
            }

            // The answer SDP rides in ackdata while status is "processing".
            // Apply it once, then keep polling for the terminal success/failure.
            if (!answerApplied && cmd.ackdata) {
              answerApplied = true;
              const answerSdp = await inflateRaw(base64ToUint8(cmd.ackdata));
              log(`Answer ackdata: base64=${cmd.ackdata.length}B → sdp=${answerSdp.length} chars`);
              const setupLine = answerSdp.match(/^a=setup:.+$/m)?.[0];
              if (setupLine) log(`ESP answer ${setupLine}`);

              await pc.setRemoteDescription(
                new RTCSessionDescription({ type: "answer", sdp: answerSdp }));
              log("Applied ESP answer. Waiting for ICE/DTLS/data channel...");
              setStatus("Connecting...");

              // Watchdog: answer applied but if ICE/DTLS never completes (e.g.
              // same-LAN hairpin), pc.connectionState can hang on "connecting"
              // forever. Fail loudly after a grace period.
              connectTimer = setTimeout(() => {
                connectTimer = null;
                if (pc && pc.connectionState !== "connected") {
                  setStatus("Connection timed out", "err");
                  log(`Connection timed out (state=${pc.connectionState}) — could not establish ICE/DTLS`);
                  stop(true);
                }
              }, 20000);
            } else if (!answerApplied) {
              log(`No answer yet (status=${cmd.status}, ${attempts})`);
            }
          } catch (error) {
            log(`Poll/apply answer error: ${error.message}`);
          }
        }, 2000);
      } catch (error) {
        setStatus("Error", "err");
        log(`Error: ${error.message}`);
        stopBtn.disabled = true;
        startBtn.disabled = false;
      }
    });
  </script>
</body>
